<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Contratos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f5f7fb;
    }

    h1 {
      color: #1f3c88;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #1f3c88;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .urgente {
      background-color: #ffe5e5;
      color: #b30000;
      font-weight: bold;
    }

    .normal {
      background-color: #e7f7e7;
      color: #1f7a1f;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>📊 Lista de Contratos</h1>

  <table>
    <thead>
      <tr>
        <th>Contrato</th>
        <th>Empresa</th>
        <th>Vencimento</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabela-contratos"></tbody>
  </table>

  <script>
    const contratos = [
      {
        numero_contrato: "001",
        empresa: "Empresa Teste",
        data_fim_vigencia: "2026-12-31"
      },
      {
        numero_contrato: "002",
        empresa: "Fornecedor Alpha",
        data_fim_vigencia: "2026-07-10"
      },
      {
        numero_contrato: "003",
        empresa: "Prestadora Beta",
        data_fim_vigencia: "2026-06-20"
      }
    ];

    function calcularStatus(dataFim) {
      const hoje = new Date();
      const vencimento = new Date(dataFim);
      const diff = Math.ceil((vencimento - hoje) / (1000 * 60 * 60 * 24));

      if (diff <= 30) return "Urgente";
      return "Normal";
    }

    const tabela = document.getElementById("tabela-contratos");

    contratos.forEach(c => {
      const status = calcularStatus(c.data_fim_vigencia);

      const linha = document.createElement("tr");

      linha.innerHTML = `
        <td>${c.numero_contrato}</td>
        <td>${c.empresa}</td>
        <td>${c.data_fim_vigencia}</td>
        <td class="${status === "Urgente" ? "urgente" : "normal"}">${status}</td>
      `;

      tabela.appendChild(linha);
    });
  </script>

</body>
</html>
