<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Contratos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>📊 Sistema de Contratos</h1>
      <p class="subtitle">Base editável gerada a partir da planilha Contratações SGI - 2026</p>
    </div>
    <div class="actions">
      <button id="btnExportar">Exportar JSON</button>
      <label class="btn-file">Importar JSON<input type="file" id="inputImportar" accept="application/json" hidden /></label>
      <button id="btnNovo" class="primary">+ Novo contrato</button>
    </div>
  </header>

  <section class="cards">
    <div class="card"><span>Total</span><strong id="kpiTotal">0</strong></div>
    <div class="card"><span>Urgentes</span><strong id="kpiUrgente">0</strong></div>
    <div class="card"><span>Vencidos</span><strong id="kpiVencido">0</strong></div>
    <div class="card"><span>Valor total</span><strong id="kpiValor">R$ 0,00</strong></div>
  </section>

  <section class="filters">
    <input type="text" id="fBusca" placeholder="Buscar por contrato, empresa, processo ou objeto" />
    <select id="fUnidade"><option value="">Todas as unidades</option></select>
    <select id="fStatus">
      <option value="">Todos os status</option>
      <option value="Normal">Normal</option>
      <option value="Atenção">Atenção</option>
      <option value="Urgente">Urgente</option>
      <option value="Vencido">Vencido</option>
      <option value="Sem data">Sem data</option>
    </select>
    <button id="btnLimpar">Limpar filtros</button>
  </section>

  <section class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Contrato</th>
          <th>Empresa</th>
          <th>Unidade</th>
          <th>Vigência</th>
          <th>Status</th>
          <th>Valor</th>
          <th>Fase atual</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbodyContratos"></tbody>
    </table>
  </section>

  <dialog id="modalContrato">
    <form method="dialog" id="formContrato">
      <div class="modal-header">
        <h2 id="tituloModal">Novo contrato</h2>
        <button type="button" id="btnFechar" class="icon">✕</button>
      </div>
      <div class="grid">
        <label>ID<input name="id" required /></label>
        <label>Número do contrato<input name="numeroContrato" /></label>
        <label>Processo SEI<input name="processoSei" /></label>
        <label>Empresa<input name="empresa" /></label>
        <label>Unidade<input name="unidade" /></label>
        <label>Modalidade<input name="modalidade" /></label>
        <label>Gestor<input name="gestor" /></label>
        <label>Fiscal<input name="fiscal" /></label>
        <label>Valor total<input name="valorTotal" type="number" step="0.01" /></label>
        <label>Data fim vigência<input name="dataFimVigencia" type="date" /></label>
        <label>Fase atual<input name="faseAtual" /></label>
        <label>Próxima fase<input name="proximaFase" /></label>
        <label class="full">Origem/aba<input name="origemAba" /></label>
        <label class="full">Objeto<textarea name="objeto" rows="3"></textarea></label>
        <label class="full">Observações<textarea name="observacoes" rows="4"></textarea></label>
      </div>
      <div class="modal-actions">
        <button type="button" id="btnExcluir" class="danger hidden">Excluir</button>
        <button type="button" id="btnCancelar">Cancelar</button>
        <button type="submit" class="primary">Salvar</button>
      </div>
    </form>
  </dialog>

  <template id="rowTemplate">
    <tr>
      <td data-k="id"></td>
      <td data-k="numeroContrato"></td>
      <td data-k="empresa"></td>
      <td data-k="unidade"></td>
      <td data-k="dataFimVigencia"></td>
      <td data-k="status"></td>
      <td data-k="valorTotal"></td>
      <td data-k="faseAtual"></td>
      <td>
        <button data-action="edit">Editar</button>
      </td>
    </tr>
  </template>

  <script src="app.js" type="module"></script>
</body>
</html>
