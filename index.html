<!DOCTYPE html>
<html>
<body>

<h2>📊 Lista de Contratos</h2>

<ul id="lista"></ul>

<script>

// simulando seu banco (igual ao Firebase)
const contratos = [
  {
    numero_contrato: "001",
    empresa: "Empresa Teste",
    data_fim_vigencia: "2026-12-31"
  }
];

// mostra na tela
const lista = document.getElementById("lista");

contratos.forEach(c => {
  const li = document.createElement("li");

  li.textContent =
    "Contrato: " + c.numero_contrato +
    " | Empresa: " + c.empresa +
    " | Vencimento: " + c.data_fim_vigencia;

  lista.appendChild(li);
});

</script>

</body>
</html>
